<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Shreevedha Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-blue: #0A2647; --primary-gold: #F5C518; --card-bg: white; --text-color: #0F172A; --input-bg: white; --input-border: #cbd5e1; }
        [data-theme="dark"] { --primary-blue: #1B3A5C; --primary-gold: #FFD700; --card-bg: #1E293B; --text-color: #E2E8F0; --input-bg: #334155; --input-border: #475569; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, var(--primary-blue) 0%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); color: var(--text-color); border-radius: 1rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 100%; max-width: 420px; padding: 2.5rem; }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header img { height: 50px; margin-bottom: 1rem; }
        .form-control { background: var(--input-bg); color: var(--text-color); border-color: var(--input-border); }
        .form-control:focus { background: var(--input-bg); color: var(--text-color); }
        .form-label { color: var(--text-color); }
        .btn-login { width: 100%; padding: 0.85rem; background: var(--primary-blue); color: white; border: none; border-radius: 0.5rem; font-weight: 700; transition: 0.3s; }
        .btn-login:hover { background: var(--primary-gold); color: black; }
        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: #64748B; text-decoration: none; font-size: 0.85rem; }
        .theme-toggle { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: white; font-size: 1.25rem; cursor: pointer; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode"><i class="bi bi-moon" id="themeIcon"></i></button>
    <div class="login-card">
        <div class="login-header">
            <img src="{{ url_for('static', filename='uploads/Shree.png') }}" alt="Shreevedha">
            <h3>Reset Password</h3>
            <p class="text-muted">Enter your email to request a reset link</p>
        </div>
        {% set messages = get_flashed_messages({ with_categories: true }) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">{{ message }}</div>
                {% endfor %}
            {% endif %}
        
        <form method="POST" action="{{ url_for('lms_forgot_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" required autofocus placeholder="Enter your account email">
            </div>
            <button type="submit" class="btn-login">Send Reset Link</button>
        </form>
        <div class="text-center mt-3">
            <p class="text-muted mb-1">Remembered it? <a href="{{ url_for('lms_login') }}">Back to login</a></p>
        </div>
        <a href="{{ url_for('home') }}" class="back-link">← Back to Website</a>
    </div>
    <script>
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('themeIcon');
        const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        icon.className = newTheme === 'dark' ? 'bi bi-sun' : 'bi bi-moon';
    }
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeIcon').className = 'bi bi-sun';
        }
    })();
    </script>
</body>
</html>
