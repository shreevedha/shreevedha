{% extends "admin/base_admin.html" %}

{% block title %}Create Course{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Create Course</h1>
        <p>Add a new course to the LMS</p>
    </div>
    <a href="{{ url_for('admin_courses') }}" class="btn btn-outline">Back to Courses</a>
</div>

<div class="card" style="max-width: 700px;">
    <form method="POST" action="{{ url_for('admin_create_course') }}" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Course Title *</label>
            <input type="text" name="title" required placeholder="e.g., Python Programming">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3" placeholder="Course description..."></textarea>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label>Duration</label>
                <input type="text" name="duration" placeholder="e.g., 60 days">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Thumbnail</label>
            <input type="file" name="thumbnail" accept="image/*">
        </div>
        <div class="table-actions" style="margin-top:0.5rem;">
            <button type="submit" class="btn btn-primary">Create Course</button>
            <a href="{{ url_for('admin_courses') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
