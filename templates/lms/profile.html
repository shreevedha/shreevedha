{% extends "lms/base.html" %}

{% block title %}Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div class="row g-4">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="fw-bold m-0" style="color: var(--primary-blue);">Profile Information</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('lms_profile') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role</label>
                        <input type="text" class="form-control" value="{{ current_user.role|title }}" disabled>
                    </div>
                    <button type="submit" class="btn btn-primary-custom">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="fw-bold m-0" style="color: var(--primary-blue);">Change Password</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('lms_profile') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Current Password</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Password</label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary-custom">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
