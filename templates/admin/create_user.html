{% extends "admin/base_admin.html" %}

{% block title %}Create User{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Create User</h1>
        <p>Add a new student, instructor, or admin</p>
    </div>
    <a href="{{ url_for('admin_users') }}" class="btn btn-outline">Back to Users</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="{{ url_for('admin_create_user') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-grid">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" required placeholder="e.g., Rahul Sharma">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required placeholder="e.g., rahul@example.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="e.g., 9876543210">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="student">Student</option>
                    <option value="instructor">Instructor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>
        <div class="table-actions" style="margin-top:0.5rem;">
            <button type="submit" class="btn btn-primary">Create User</button>
            <a href="{{ url_for('admin_users') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
