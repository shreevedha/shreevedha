{% extends "base.html" %}
{% block title %}Blog | Shreevedha Solutions{% endblock %}
{% block content %}
<section class="section">
    <div class="container">
        <h1 class="section-title">Our Blog</h1>
        <div class="grid-3">
            {% for post in posts %}
            <div class="card">
                <img src="{{ post.image }}" alt="{{ post.title }}" style="width:100%; height:180px; object-fit:cover; border-radius:0.5rem;">
                <h3>{{ post.title }}</h3>
                <p style="color: var(--gray);">{{ post.date }}</p>
                <p>{{ post.summary }}</p>
                <a href="#" class="btn btn-outline" style="padding:0.3rem 1rem;">Read More</a>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
